<!DOCTYPE html>
<html>
<head>
  <title>Feedback</title>
  <style>

    body {
      margin: 0;
      font-family: Arial;
      background: url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092") no-repeat center center/cover;
    }

    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form {
      background: white;
      padding: 25px;
      width: 350px;
      border-radius: 10px;
      text-align: center;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    textarea {
      resize: none;
      height: 80px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: orange;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }

    /* Popup */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .popup-box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 300px;
    }

    .check {
      font-size: 40px;
      color: green;
    }

  </style>
</head>
<body>

<div class="container">

  <form class="form" onsubmit="submitFeedback(event)">
    <h2>Give Feedback</h2>

    <!-- Donor Name -->
    <input type="text" placeholder="Donor Name" required>

    <!-- Rating -->
    <select required>
      <option>Rating</option>
      <option>⭐ 1 - Poor</option>
      <option>⭐⭐ 2 - Fair</option>
      <option>⭐⭐⭐ 3 - Good</option>
      <option>⭐⭐⭐⭐ 4 - Very Good</option>
      <option>⭐⭐⭐⭐⭐ 5 - Excellent</option>
    </select>

    <!-- Comment -->
    <textarea placeholder="Write your feedback..." required></textarea>

    <!-- Submit -->
    <button type="submit">Submit Feedback</button>
  </form>

</div>

<!-- SUCCESS POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <div class="check">✔</div>
    <h3>Thank You!</h3>
    <p>Your feedback has been submitted.</p>
    <button onclick="goToDashboard()">Back</button>
  </div>
</div>

<script>
function submitFeedback(event) {
  event.preventDefault();
  document.getElementById("popup").style.display = "flex";
}

function goToDashboard() {
  window.location.href = "requestDashboard.html";
}
</script>

</body>
</html>
