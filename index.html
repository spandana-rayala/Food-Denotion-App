<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
          margin: 0;
          font-family: Arial;
          background: url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092") no-repeat center center/cover;
        }
        .hero {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        }

        /* Dark overlay like your image */
        .hero::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        }

        .overlay {
        position: relative;
        text-align: center;
        color: white;
        z-index: 1;
        padding: 20px;
        }

        .overlay h1 {
        font-size: 55px;
        font-weight: bold;
        margin-bottom: 20px;
        line-height: 1.2;
        }

        .overlay h1 span {
        color: #ffa726;
        }

        .highlight {
        color: #ff6f00;
        }

        .overlay p {
        font-size: 22px;
        margin-bottom: 40px;
        letter-spacing: 1px;
        }

        /* Buttons */
        .buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        }

        .buttons button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 40px;
        cursor: pointer;
        transition: 0.3s ease;
        }

        /* Donate Button */
        .donate {
        background: linear-gradient(45deg, #ff6f00, #ff9800);
        color: white;
        }

        /* Request Button */
        .request {
        background: linear-gradient(45deg, #2e7d32, #66bb6a);
        color: white;
        }

        .buttons button:hover {
        transform: scale(1.05);
        opacity: 0.9;
        }
    </style>
</head>
<body>
    <section class="hero">
  <div class="overlay">
    <h1>
      Turn <span>Leftover Meals</span> Into <span class="highlight">Lifelines</span>
    </h1>
    <p>Connect. Share. Nourish.</p>

    <div class="buttons">
      <button class="donate" onclick="goToDonate()">Donate Meals</button>
      <button class="request" onclick="goToRequest()">Request Meals</button>
    </div>
    <script>
    function goToDonate() {
    window.location.href = "donate.html";
    }
    function goToRequest() {
    window.location.href = "request.html";
    }
    </script>
  </div>
  </section>
</body>
</html>
