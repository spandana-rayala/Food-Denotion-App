<!DOCTYPE html>
<html>
<head>
  <title>Donor Dashboard</title>
  <style>

    body {
      margin: 0;
      font-family: Arial;
      background: url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092") no-repeat center center/cover;
      color: white;
    }

    /* Overlay */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      top: 0;
      left: 0;
      z-index: -1;
    }

    .dashboard {
      padding: 30px;
    }

    /* Summary */
    .summary {
      display: flex;
      gap: 15px;
      margin: 20px 0;
    }

    .box {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 10px;
      width: 180px;
      text-align: center;
    }

    /* Profile */
    .profile {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    /* Cards */
    .cards {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      color: black;
      padding: 15px;
      width: 240px;
      border-radius: 10px;
    }

    .completed {
      color: green;
      font-weight: bold;
    }
    .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    }
    .top-buttons button {
      margin-left: 10px;
      padding: 8px 12px;
      font-size: 18px;
      border-radius: 8px;
    }
    button {
      padding: 10px 20px;
      background: orange;
      border: none;
      color: white;
      margin-bottom: 20px;
      cursor: pointer;
    }

  </style>
</head>
<body>

<div class="dashboard">
  <div class="header"></div>
  <h2>Welcome, Donor 👋</h2>
  <div class="top-buttons">
    <button onclick="openNotifications()">🔔</button>
    <button onclick="openSettings()">⚙️</button>
  </div>
</div>
  <!-- Summary -->
  <div class="summary">
    <div class="box" id="totalDonations"></div>
    <div class="box" id="totalMeals"></div>
    <div class="box" id="completedCount"></div>
  </div>

  <!-- Profile -->
  <div class="profile">
    <h3>Donor Info</h3>
    <p><b>Name:</b> John</p>
    <p><b>Age:</b> 35</p>
    <p><b>Occupation:</b> Restaurateur</p>
    <p><b>Nearby Landmark:</b> Beside Domino's Pizza, Kukatpally</p>
    <p><b>City:</b> Hyderabad</p>
  </div>

  <!-- Button -->
  <button onclick="goToDonate()">+ Add Donation</button>

  <!-- Completed -->
  <h3>Completed Donations</h3>
  <div id="completedList" class="cards"></div>

</div>

<script>

const donations = [
  {
    meal: "Rice & Curry",
    quantity: 20,
    cookingTime: "10:00 AM",
    expiryTime: "2:00 PM",
    location: "Hyderabad",
    date: "12 Jan 2026",
    status: "Completed"
  },
  {
    meal: "Biryani",
    quantity: 15,
    cookingTime: "12:00 PM",
    expiryTime: "5:00 PM",
    location: "Warangal",
    date: "20 Feb 2026",
    status: "Completed"
  }
];

const completedContainer = document.getElementById("completedList");

let totalMeals = 0;
let completedCount = 0;

donations.forEach(d => {
  totalMeals += d.quantity;

  const card = document.createElement("div");
  card.classList.add("card");

  card.innerHTML = `
    <h3>${d.meal}</h3>
    <p><b>Meals:</b> ${d.quantity}</p>
    <p><b>Cooking:</b> ${d.cookingTime}</p>
    <p><b>Expiry:</b> ${d.expiryTime}</p>
    <p><b>Location:</b> ${d.location}</p>
    <p><b>Date:</b> ${d.date}</p>
    <p class="completed">Status: ${d.status}</p>
  `;

  completedContainer.appendChild(card);
  completedCount++;
});

// Summary
document.getElementById("totalDonations").innerText =
  "Total Donations: " + donations.length;

document.getElementById("totalMeals").innerText =
  "Total Meals: " + totalMeals;

document.getElementById("completedCount").innerText =
  "Completed: " + completedCount;

// Navigation
function goToDonate() {
  window.location.href = "donateform.html";
}
function openSettings() {
  alert("Settings page coming soon ⚙️");
}

function openNotifications() {
  alert("No new notifications 🔔");
}
</script>

</body>
</html>
